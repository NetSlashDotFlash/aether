<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#020408">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ÆTHER">
<meta name="description" content="Alleva una creatura cosmica. Osservala crescere nel tempo reale.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<title>ÆTHER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{height:100%;height:-webkit-fill-available}
body{
  width:100%;height:100vh;height:-webkit-fill-available;
  overflow:hidden;background:#000;
  font-family:'Raleway',sans-serif;
  -webkit-font-smoothing:antialiased;
}

:root{
  --teal:#00e5c8;--teal2:#00b89e;--teal3:#007a6a;
  --gold:#c9a84c;--gold2:#e8c97a;
  --rose:#e05a6a;--violet:#7c5cbf;
  --fog:#a0b8c8;--fog2:#5a7080;
  --bg0:#020408;
  --panel:rgba(3,8,14,0.9);
  --border:rgba(0,229,200,0.1);
  --circ:119.38; /* 2*PI*19 */
}

/* ── BG CANVAS ─────────────────────── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── PARTICLES ─────────────────────── */
#particles{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:ptA .9s ease-out forwards}
@keyframes ptA{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* ── TOAST ─────────────────────────── */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  z-index:300;min-width:240px;max-width:300px;
  background:rgba(2,5,12,.97);
  border:1px solid var(--teal);border-radius:16px;
  padding:16px 20px;text-align:center;
  box-shadow:0 0 30px rgba(0,229,200,.15);
  display:none;animation:toastIn .3s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#toast-badge{display:inline-block;font-size:8px;letter-spacing:2px;padding:2px 8px;border-radius:4px;margin-bottom:8px;text-transform:uppercase}
#toast-name{font-family:'Cinzel',serif;font-size:14px;color:var(--teal);letter-spacing:2px;margin-bottom:5px}
#toast-desc{font-size:11px;color:var(--fog2);font-weight:300;line-height:1.6}

/* ── EGG VIEW ──────────────────────── */
#egg-view{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 55%,#060d18,#010205);
  cursor:pointer;user-select:none;
}
#egg-super{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:7px;
  color:var(--fog2);opacity:.5;margin-bottom:44px;text-transform:uppercase;
}
#egg-float{animation:eggFloat 3.5s ease-in-out infinite;position:relative;display:flex;align-items:center;justify-content:center}
@keyframes eggFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#egg-glow{position:absolute;inset:-50px;border-radius:50%;background:radial-gradient(circle,rgba(90,50,180,.13) 0%,transparent 70%);animation:auraPulse 3.5s ease-in-out infinite;pointer-events:none}
@keyframes auraPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.14);opacity:1}}
#egg-prog-wrap{margin-top:50px;text-align:center}
#egg-days{font-size:13px;font-weight:300;color:var(--fog);letter-spacing:2px;margin-bottom:14px}
#egg-bar{width:200px;height:2px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden;margin:0 auto 12px}
#egg-bar-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--teal));border-radius:1px;transition:width 1s}
#egg-hint{font-size:9px;color:var(--fog2);letter-spacing:2.5px;animation:blink 2s step-end infinite}
@keyframes blink{50%{opacity:0}}
#egg-taps-info{font-size:9px;color:rgba(120,80,200,.5);margin-top:8px;min-height:13px;letter-spacing:1px}

/* ── MAIN APP ──────────────────────── */
#app{
  position:fixed;inset:0;z-index:10;
  display:grid;
  grid-template-rows:68px 1fr 52px;
  display:none;
}

/* ── HEADER ───────────────────────── */
#header{
  display:flex;align-items:center;padding:10px 14px;gap:10px;
  background:linear-gradient(to bottom,rgba(2,4,8,.96),rgba(2,4,8,.5));
  border-bottom:1px solid var(--border);z-index:20;
  padding-top:max(10px, env(safe-area-inset-top));
}
#hdr-info{flex:1;min-width:0}
#hdr-name{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--teal);letter-spacing:3px;text-shadow:0 0 18px var(--teal);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-size:10px;font-weight:300;color:var(--gold);letter-spacing:2px;margin-top:3px;opacity:.85}
#hdr-age{font-size:10px;color:var(--fog2);letter-spacing:1px;margin-top:2px}

#coin-btn{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.22);
  border-radius:12px;padding:7px 12px;cursor:pointer;transition:border-color .2s;flex-shrink:0;
}
#coin-btn:active{transform:scale(.95)}
#coin-btn:hover{border-color:rgba(201,168,76,.4)}
#coin-row{display:flex;align-items:center;gap:5px}
#coin-icon{font-size:13px;color:var(--gold)}
#coin-val{font-size:16px;font-weight:500;color:var(--gold2);letter-spacing:1px}
#coin-label{font-size:7px;color:var(--fog2);letter-spacing:1.5px;margin-top:1px}

/* ── MIDDLE ───────────────────────── */
#middle{
  display:grid;
  grid-template-columns:74px 1fr 74px;
  overflow:hidden;position:relative;
}

/* ── STATS LEFT ───────────────────── */
#stats-col{
  display:flex;flex-direction:column;justify-content:center;gap:8px;
  padding:10px 6px 10px 8px;
  background:linear-gradient(to right,rgba(2,4,8,.88),transparent);
  z-index:15;
}
.sblock{display:flex;flex-direction:column;align-items:center;gap:3px}
.sring{position:relative;width:48px;height:48px}
.sring svg{width:100%;height:100%;transform:rotate(-90deg)}
.rbg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:3.5}
.rfill{fill:none;stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)}
.sval{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--fog)}
.slabel{font-size:8px;letter-spacing:1.5px;color:var(--fog2);text-transform:uppercase}

/* ── CREATURE CENTER ──────────────── */
#creature-col{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#c-aura{position:absolute;width:230px;height:230px;border-radius:50%;pointer-events:none;animation:auraPulse 4s ease-in-out infinite;z-index:1}
#c-sprite{position:relative;z-index:5;cursor:pointer;transition:transform .15s;display:flex;align-items:center;justify-content:center}
#c-sprite:active{transform:scale(.93)}
#c-msg{position:absolute;bottom:16px;font-size:11px;letter-spacing:1.5px;color:var(--teal);text-shadow:0 0 10px var(--teal);white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;z-index:6}
#c-msg.on{opacity:1}

/* trait pills */
#traits-wrap{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:180px;z-index:6;pointer-events:none}
.tpill{font-size:8px;padding:2px 6px;border-radius:4px;letter-spacing:.7px;white-space:nowrap}

/* absence overlay */
#absence-overlay{
  position:absolute;inset:0;z-index:30;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(2,4,8,.85);backdrop-filter:blur(6px);
}
#absence-overlay.on{display:flex}
#absence-title{font-family:'Cinzel',serif;font-size:15px;color:var(--teal);letter-spacing:4px;margin-bottom:10px}
#absence-desc{font-size:11px;color:var(--fog2);letter-spacing:.8px;text-align:center;padding:0 24px;line-height:1.6}
#absence-cd{font-size:14px;color:var(--gold2);margin-top:12px;letter-spacing:2px;font-weight:500}

/* ── ACTIONS RIGHT ────────────────── */
#actions-col{
  display:flex;flex-direction:column;justify-content:center;gap:7px;
  padding:10px 8px 10px 4px;
  background:linear-gradient(to left,rgba(2,4,8,.88),transparent);
  z-index:15;
}
.abtn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;min-height:56px;
}
.abtn:not(.cd):not(.absent-lock):active{transform:scale(.9)}
.abtn.cd,.abtn.absent-lock{opacity:.3;cursor:not-allowed}
.abtn.rdy:not(.cd):not(.absent-lock)::after{content:'';position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 7px var(--teal);animation:dotP .8s ease-in-out infinite alternate}
@keyframes dotP{from{opacity:.3}to{opacity:1}}
.abtn[data-cost]::before{content:attr(data-cost);position:absolute;bottom:3px;right:4px;font-size:7px;color:var(--gold2);letter-spacing:.3px}
.aicon{font-size:20px;line-height:1}
.alabel{font-size:8px;font-weight:500;letter-spacing:.8px;color:var(--fog2);text-transform:uppercase}
.acd{font-size:8px;color:var(--gold2);letter-spacing:.3px;min-height:10px;line-height:1}

/* ── FOOTER ───────────────────────── */
#footer{
  display:flex;align-items:center;padding:8px 14px;gap:10px;
  background:linear-gradient(to top,rgba(2,4,8,.96),rgba(2,4,8,.5));
  border-top:1px solid var(--border);z-index:20;
  padding-bottom:max(8px, env(safe-area-inset-bottom));
}
#notif{flex:1;font-size:11px;font-weight:300;color:var(--teal2);letter-spacing:1px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:opacity .5s}
#daybar-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
#daybar{width:55px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}
#daybar-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--teal));transition:width 2s linear}
#daybar-lbl{font-size:8px;color:var(--fog2);letter-spacing:.5px;white-space:nowrap;min-width:24px}

/* ── SHOP MODAL ───────────────────── */
#shop-modal{
  position:fixed;inset:0;z-index:400;
  background:rgba(1,2,6,.96);
  display:none;flex-direction:column;align-items:center;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  overflow-y:auto;
}
#shop-modal.on{display:flex}
#shop-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px;padding:20px 0 20px}
#shop-title{font-family:'Cinzel',serif;font-size:16px;color:var(--teal);letter-spacing:4px}
#shop-balance{font-size:13px;color:var(--gold2);letter-spacing:1px}
#shop-close-btn{font-size:11px;color:var(--fog2);letter-spacing:2px;cursor:pointer;padding:8px 16px;border:1px solid var(--border);border-radius:8px;transition:border-color .2s}
#shop-close-btn:active{opacity:.6}
#shop-items-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;padding-bottom:20px}
.sitem{
  display:flex;align-items:center;gap:14px;
  background:rgba(4,10,18,.92);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .2s;
}
.sitem:hover{border-color:rgba(0,229,200,.3)}
.sitem:active{transform:scale(.97)}
.sitem-icon{font-size:24px;flex-shrink:0}
.sitem-info{flex:1;min-width:0}
.sitem-name{font-size:13px;color:var(--fog);letter-spacing:.8px}
.sitem-desc{font-size:10px;color:var(--fog2);margin-top:3px;line-height:1.4}
.sitem-cost{display:flex;align-items:center;gap:3px;font-size:14px;color:var(--gold2);white-space:nowrap;flex-shrink:0}
.sitem.cant-afford{opacity:.4}

/* ── ABILITIES MODAL ──────────────── */
#abilities-modal{
  position:fixed;inset:0;z-index:400;
  background:rgba(1,2,6,.96);
  display:none;flex-direction:column;align-items:center;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  overflow-y:auto;
}
#abilities-modal.on{display:flex}
#ab-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px;padding:20px 0 16px}
#ab-title{font-family:'Cinzel',serif;font-size:15px;color:var(--teal);letter-spacing:4px}
#ab-close-btn{font-size:11px;color:var(--fog2);letter-spacing:2px;cursor:pointer;padding:8px 16px;border:1px solid var(--border);border-radius:8px}
#ab-close-btn:active{opacity:.6}
#ab-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;padding-bottom:20px}
.ab-card{
  background:rgba(4,10,18,.92);border-radius:14px;padding:14px 16px;
  border-left:3px solid var(--teal);
}
.ab-card-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ab-card-icon{font-size:18px}
.ab-card-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px}
.ab-card-cat{font-size:8px;padding:2px 7px;border-radius:3px;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0}
.ab-card-desc{font-size:11px;color:var(--fog2);line-height:1.6}
#ab-empty{text-align:center;color:var(--fog2);font-size:13px;padding:40px 20px;line-height:1.8;letter-spacing:.5px}

/* ── INSTALL BANNER ───────────────── */
#install-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(2,8,16,.97);border-top:1px solid var(--border);
  padding:14px 20px;display:none;
  flex-direction:row;align-items:center;gap:12px;
}
#install-banner.on{display:flex}
#install-text{flex:1;font-size:12px;color:var(--fog);line-height:1.5;letter-spacing:.5px}
#install-btn{font-size:12px;padding:8px 16px;background:var(--teal3);color:var(--teal);border:1px solid var(--teal2);border-radius:8px;cursor:pointer;letter-spacing:1px;white-space:nowrap}
#install-dismiss{font-size:18px;color:var(--fog2);cursor:pointer;padding:4px}

/* ── SPLASH ───────────────────────── */
#splash{
  position:fixed;inset:0;z-index:600;
  background:radial-gradient(ellipse at 50% 40%,#060d18,#010205);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s;
}
#splash.fade{opacity:0;pointer-events:none}
#splash-logo{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--teal);letter-spacing:8px;text-shadow:0 0 40px var(--teal);margin-bottom:8px}
#splash-sub{font-size:10px;color:var(--fog2);letter-spacing:6px;text-transform:uppercase;opacity:.6}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-logo">ÆTHER</div>
  <div id="splash-sub">creature cosmiche</div>
</div>

<!-- BG -->
<canvas id="bg-canvas"></canvas>
<div id="particles"></div>

<!-- TOAST -->
<div id="toast">
  <div id="toast-badge"></div>
  <div id="toast-name"></div>
  <div id="toast-desc"></div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div id="install-text">Aggiungi ÆTHER alla schermata home per usarla come app.</div>
  <div id="install-btn" onclick="doInstall()">INSTALLA</div>
  <div id="install-dismiss" onclick="dismissInstall()">✕</div>
</div>

<!-- ══════════ EGG VIEW ══════════════ -->
<div id="egg-view">
  <div id="egg-super">æther · genesis</div>
  <div id="egg-float">
    <div id="egg-glow"></div>
    <svg width="160" height="192" viewBox="0 0 160 192">
      <defs>
        <radialGradient id="eG" cx="38%" cy="32%">
          <stop offset="0%" stop-color="#1c0f40"/>
          <stop offset="65%" stop-color="#0c061a"/>
          <stop offset="100%" stop-color="#050210"/>
        </radialGradient>
        <radialGradient id="eS" cx="34%" cy="28%">
          <stop offset="0%" stop-color="rgba(140,95,255,.3)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <ellipse cx="80" cy="104" rx="58" ry="78" fill="url(#eG)" stroke="rgba(110,65,215,.5)" stroke-width="1.5"/>
      <ellipse cx="80" cy="104" rx="58" ry="78" fill="url(#eS)"/>
      <path d="M64 58 Q71 80 67 112 Q65 126 69 142" fill="none" stroke="rgba(95,55,200,.22)" stroke-width="1"/>
      <path d="M97 50 Q89 76 93 108 Q95 128 87 146" fill="none" stroke="rgba(95,55,200,.16)" stroke-width=".8"/>
      <path d="M50 94 Q72 99 90 96 Q108 93 116 100" fill="none" stroke="rgba(95,55,200,.13)" stroke-width=".8"/>
      <ellipse cx="56" cy="68" rx="8" ry="14" fill="rgba(160,120,255,.08)" transform="rotate(-16,56,68)"/>
      <circle cx="65" cy="56" r="3" fill="rgba(200,170,255,.16)"/>
      <circle cx="60" cy="63" r="1.5" fill="rgba(255,255,255,.22)"/>
      <g id="ecracks" opacity="0" style="transition:opacity 1.5s">
        <path d="M80 38 L74 55 L83 60 L77 77" fill="none" stroke="rgba(0,229,200,.7)" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M56 86 L65 92 L60 101" fill="none" stroke="rgba(0,229,200,.45)" stroke-width="1" stroke-linecap="round"/>
        <path d="M104 112 L97 118 L102 128" fill="none" stroke="rgba(0,229,200,.4)" stroke-width=".9" stroke-linecap="round"/>
      </g>
      <ellipse cx="80" cy="104" rx="58" ry="78" fill="none" stroke="rgba(110,65,215,.28)" stroke-width="2">
        <animate attributeName="rx" values="58;72;58" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="78;94;78" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".55;0;.55" dur="3.5s" repeatCount="indefinite"/>
      </ellipse>
    </svg>
  </div>
  <div id="egg-prog-wrap">
    <div id="egg-days">— — —</div>
    <div id="egg-bar"><div id="egg-bar-fill" style="width:0%"></div></div>
    <div id="egg-hint">· tocca per vegliare ·</div>
    <div id="egg-taps-info"></div>
  </div>
</div>

<!-- ══════════ MAIN APP ══════════════ -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="hdr-info">
      <div id="hdr-name">—</div>
      <div id="hdr-sub">— · —</div>
      <div id="hdr-age">—</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
      <div id="coin-btn" onclick="openShop()">
        <div id="coin-row"><span id="coin-icon">◈</span><span id="coin-val">0</span></div>
        <div id="coin-label">AETHERIN</div>
      </div>
      <div onclick="openAbilities()" style="font-size:8px;color:var(--fog2);letter-spacing:2px;cursor:pointer;text-align:center;padding:2px 4px;border:1px solid var(--border);border-radius:4px">ABILITÀ</div>
    </div>
  </div>

  <!-- MIDDLE -->
  <div id="middle">

    <!-- STATS SX -->
    <div id="stats-col">
      <div class="sblock">
        <div class="sring">
          <svg viewBox="0 0 48 48"><circle class="rbg" cx="24" cy="24" r="19"/><circle class="rfill" id="ring-hp" cx="24" cy="24" r="19" stroke="#e05a6a" stroke-dasharray="119.38" stroke-dashoffset="23.88"/></svg>
          <div class="sval" id="val-hp">80</div>
        </div>
        <div class="slabel">HP</div>
      </div>
      <div class="sblock">
        <div class="sring">
          <svg viewBox="0 0 48 48"><circle class="rbg" cx="24" cy="24" r="19"/><circle class="rfill" id="ring-en" cx="24" cy="24" r="19" stroke="#c9a84c" stroke-dasharray="119.38" stroke-dashoffset="11.94"/></svg>
          <div class="sval" id="val-en">90</div>
        </div>
        <div class="slabel">Ener.</div>
      </div>
      <div class="sblock">
        <div class="sring">
          <svg viewBox="0 0 48 48"><circle class="rbg" cx="24" cy="24" r="19"/><circle class="rfill" id="ring-str" cx="24" cy="24" r="19" stroke="#e8855a" stroke-dasharray="119.38" stroke-dashoffset="119.38"/></svg>
          <div class="sval" id="val-str">0</div>
        </div>
        <div class="slabel">Forza</div>
